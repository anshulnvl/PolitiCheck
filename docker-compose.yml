services:
  redis:
    image: redis:7
    ports: ["6379:6379"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: politicheck
      POSTGRES_USER: politicheck
      POSTGRES_PASSWORD: secret
    ports: ["5432:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]

volumes:
  pg_data: